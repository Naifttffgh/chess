<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Pro - Promotion UI</title>
    <style>
        :root {
            --bg: #161512;
            --light-sq: #ebecd0;
            --dark-sq: #779556;
            --panel: #262421;
            --accent: #b1c94e;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-layout {
            display: grid;
            grid-template-columns: auto 350px;
            gap: 40px;
            padding: 20px;
            max-width: 1200px;
        }

        /* الرقعة */
        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 8px solid #3c3934;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            user-select: none;
        }

        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            cursor: pointer;
            position: relative;
        }

        .square.light { background-color: var(--light-sq); }
        .square.dark { background-color: var(--dark-sq); }
        .square.selected { background-color: #f5f682 !important; }
        .square.last-move { background-color: #f5f68288 !important; }

        .piece {
            z-index: 2;
            transition: transform 0.1s;
        }

        /* نافذة خيارات الترقية (Promotion UI) */
        #promotion-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
            text-align: center;
            border: 2px solid var(--accent);
        }

        .promo-options {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .promo-btn {
            background: #444;
            font-size: 40px;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            border: 1px solid #666;
        }

        .promo-btn:hover { background: var(--accent); }

        /* لوحة التحكم */
        .side-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 560px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .status-header {
            background: #1a1917;
            padding: 15px;
            border-radius: 8px;
            border-right: 5px solid var(--accent);
            text-align: center;
        }

        .history-box {
            flex-grow: 1;
            background: #1a1917;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-family: monospace;
            border: 1px solid #333;
        }

        .move-entry {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #2a2825;
            font-size: 0.9rem;
        }

        .controls button {
            width: 100%;
            margin-bottom: 10px;
            background: #3c3934;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button.new-game { background: var(--accent); color: #000; }

        @media (max-width: 1000px) {
            .game-layout { grid-template-columns: 1fr; }
            .side-panel { height: auto; }
        }
    </style>
</head>
<body>

    <div class="game-layout">
        <div class="board-container">
            <div class="status-header" id="status">دورك (الأبيض)</div>
            <div class="chess-board" id="board"></div>
            
            <!-- نافذة الترقية -->
            <div id="promotion-overlay">
                <div>اختر قطعة الترقية:</div>
                <div class="promo-options">
                    <div class="promo-btn" onclick="selectPromotion('q')">♕</div>
                    <div class="promo-btn" onclick="selectPromotion('r')">♖</div>
                    <div class="promo-btn" onclick="selectPromotion('b')">♗</div>
                    <div class="promo-btn" onclick="selectPromotion('n')">♘</div>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <h2 style="margin:0; text-align:center;">الموقع ضدك</h2>
            <div class="controls">
                <button class="new-game" onclick="initGame()">مباراة جديدة</button>
                <button onclick="undoMove()">تراجع</button>
            </div>
            <div class="history-box" id="history"></div>
            <div style="font-size: 0.8rem; color: #555; text-align:center;">210Hz Optimized | Promotion Enabled</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const historyElement = document.getElementById('history');
        const promoOverlay = document.getElementById('promotion-overlay');
        
        let game = new Chess();
        let selectedSquare = null;
        let pendingMove = null;

        const pieceEmojis = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
        };

        function initGame() {
            game = new Chess();
            selectedSquare = null;
            pendingMove = null;
            promoOverlay.style.display = 'none';
            renderBoard();
            updateStatus();
            historyElement.innerHTML = '';
        }

        function renderBoard() {
            boardElement.innerHTML = '';
            const boardData = game.board();

            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const square = document.createElement('div');
                    const squareName = String.fromCharCode(97 + j) + (8 - i);
                    const isDark = (i + j) % 2 === 1;
                    
                    square.className = `square ${isDark ? 'dark' : 'light'}`;
                    square.dataset.square = squareName;
                    if (selectedSquare === squareName) square.classList.add('selected');

                    const piece = boardData[i][j];
                    if (piece) {
                        const pieceSpan = document.createElement('span');
                        pieceSpan.className = 'piece';
                        pieceSpan.innerText = pieceEmojis[piece.color === 'w' ? piece.type.toUpperCase() : piece.type];
                        pieceSpan.style.color = piece.color === 'w' ? '#fff' : '#000';
                        square.appendChild(pieceSpan);
                    }

                    square.onclick = () => handleSquareClick(squareName);
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(square) {
            if (game.game_over() || pendingMove) return;

            if (selectedSquare) {
                // التحقق من وجود ترقية (وصول عسكري لآخر صف)
                const moveData = { from: selectedSquare, to: square };
                const piece = game.get(selectedSquare);
                
                if (piece && piece.type === 'p' && (square[1] === '8' || square[1] === '1')) {
                    // إظهار نافذة الترقية
                    pendingMove = moveData;
                    promoOverlay.style.display = 'block';
                    return;
                }

                executeMove(moveData);
            } else {
                const piece = game.get(square);
                if (piece && piece.color === 'w') {
                    selectedSquare = square;
                    renderBoard();
                }
            }
        }

        function selectPromotion(pieceType) {
            if (pendingMove) {
                pendingMove.promotion = pieceType;
                executeMove(pendingMove);
                pendingMove = null;
                promoOverlay.style.display = 'none';
            }
        }

        function executeMove(moveObj) {
            const move = game.move(moveObj);
            if (move) {
                selectedSquare = null;
                renderBoard();
                updateStatus();
                addHistory(move);
                setTimeout(makeComputerMove, 300);
            } else {
                selectedSquare = null;
                renderBoard();
            }
        }

        function makeComputerMove() {
            const moves = game.moves();
            if (moves.length === 0) return;
            // الموقع يختار حركة ذكية (تلقائياً يختار الوزير لو فيه ترقية)
            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            const move = game.move(randomMove);
            renderBoard();
            updateStatus();
            addHistory(move);
        }

        function updateStatus() {
            let status = game.turn() === 'w' ? 'دورك (الأبيض)' : 'الموقع يفكر...';
            if (game.in_checkmate()) status = 'انتهت - كش ملك!';
            if (game.in_draw()) status = 'انتهت - تعادل';
            statusElement.innerText = status;
        }

        function addHistory(move) {
            const div = document.createElement('div');
            div.className = 'move-entry';
            div.innerHTML = `<span>${move.from} → ${move.to}</span> <span>${move.san}</span>`;
            historyElement.prepend(div);
        }

        function undoMove() {
            game.undo(); game.undo();
            renderBoard();
            updateStatus();
        }

        initGame();
    </script>
</body>
</html>
