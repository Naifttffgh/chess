<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chess Emoji - Promotion & Fast Play 🏆</title>
    <style>
        :root {
            --bg: #161512;
            --light-sq: #ebecd0;
            --dark-sq: #779556;
            --panel: #262421;
            --accent: #b1c94e;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-layout {
            display: grid;
            grid-template-columns: auto 380px;
            gap: 30px;
            padding: 20px;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 75px);
            grid-template-rows: repeat(8, 75px);
            border: 8px solid #3c3934;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            user-select: none;
        }

        .square {
            width: 75px; height: 75px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            font-size: 50px;
        }

        .square.light { background-color: var(--light-sq); }
        .square.dark { background-color: var(--dark-sq); }
        .square.selected { background-color: #f5f682 !important; }
        .square.last-move { background-color: rgba(245, 246, 130, 0.4) !important; }

        /* نافذة الترقية */
        #promotion-dialog {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 15px;
            border: 3px solid var(--accent);
            border-radius: 10px;
            z-index: 100;
            text-align: center;
        }

        .promo-choice {
            font-size: 40px;
            cursor: pointer;
            padding: 5px;
            transition: 0.2s;
        }
        .promo-choice:hover { background: #444; }

        .side-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            height: 620px;
        }

        .pgn-container {
            flex-grow: 1;
            background: #1a1917;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            overflow-y: auto;
            color: #ccc;
            font-size: 0.85rem;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-sec { background: #3c3934; color: #fff; }
        .btn-fast { background: #e67e22; color: #fff; }
    </style>
</head>
<body>

    <div class="game-layout">
        <div style="text-align:center; position: relative;">
            <div id="status" style="margin-bottom:15px; font-size:1.5rem;">⚪ دور الأبيض</div>
            
            <div class="chess-board" id="board"></div>

            <div id="promotion-dialog">
                <div style="margin-bottom:10px;">اختر الترقية:</div>
                <span class="promo-choice" onclick="makePromotion('q')">♕</span>
                <span class="promo-choice" onclick="makePromotion('r')">♖</span>
                <span class="promo-choice" onclick="makePromotion('b')">♗</span>
                <span class="promo-choice" onclick="makePromotion('n')">♘</span>
            </div>
        </div>

        <div class="side-panel">
            <h3 style="text-align:center; color:var(--accent);">⚙️ التحكم</h3>
            <button class="btn-fast" onclick="playFastGame()">🚀 تشغيل المباراة السريعة</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-main" onclick="resetGame()">🔄 جديد</button>
                <button class="btn-sec" onclick="undoMove()">🔙 تراجع</button>
            </div>
            
            <div style="font-size:0.9rem;">📝 PGN:</div>
            <div class="pgn-container" id="pgn-display"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script>
        const game = new Chess();
        const boardEl = document.getElementById('board');
        const pgnEl = document.getElementById('pgn-display');
        const statusEl = document.getElementById('status');
        const promoDialog = document.getElementById('promotion-dialog');

        let selectedSq = null;
        let lastMove = { from: null, to: null };
        let pendingPromo = null;

        const pieceEmojis = {
            'w': { 'p': '♙', 'r': '♖', 'n': '♘', 'b': '♗', 'q': '♕', 'k': '♔' },
            'b': { 'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚' }
        };

        function render() {
            boardEl.innerHTML = '';
            const board = game.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const sq = String.fromCharCode(97 + j) + (8 - i);
                    const squareDiv = document.createElement('div');
                    squareDiv.className = `square ${(i + j) % 2 === 0 ? 'light' : 'dark'}`;
                    if (selectedSq === sq) squareDiv.classList.add('selected');
                    if (lastMove.from === sq || lastMove.to === sq) squareDiv.classList.add('last-move');

                    const piece = board[i][j];
                    if (piece) squareDiv.innerText = pieceEmojis[piece.color][piece.type];
                    
                    squareDiv.onclick = () => handleSquare(sq);
                    boardEl.appendChild(squareDiv);
                }
            }
            pgnEl.innerText = game.pgn();
        }

        function handleSquare(sq) {
            if (game.game_over()) return;
            if (selectedSq) {
                const piece = game.get(selectedSq);
                // تحقق من الترقية
                if (piece && piece.type === 'p' && (sq[1] === '8' || sq[1] === '1')) {
                    pendingPromo = { from: selectedSq, to: sq };
                    promoDialog.style.display = 'block';
                    return;
                }
                executeMove({ from: selectedSq, to: sq });
            } else {
                const p = game.get(sq);
                if (p && p.color === game.turn()) { selectedSq = sq; render(); }
            }
        }

        function makePromotion(type) {
            promoDialog.style.display = 'none';
            executeMove({ ...pendingPromo, promotion: type });
            pendingPromo = null;
        }

        function executeMove(moveObj) {
            const move = game.move(moveObj);
            if (move) {
                lastMove = { from: move.from, to: move.to };
                selectedSq = null;
                render();
                updateStatus();
            } else {
                selectedSq = null;
                render();
            }
        }

        function updateStatus() {
            let s = game.turn() === 'w' ? "⚪ دور الأبيض" : "⚫ دور الأسود";
            if (game.in_checkmate()) s = "🏁 كش ملك! انتهت اللعبة";
            statusEl.innerText = s;
        }

        // وظيفة المباراة السريعة حسب نقلاتك
        async function playFastGame() {
            resetGame();
            const fastMoves = [
                "d4", "h5", "d5", "f5", "Qd4", "e6", "d6", "b6", "dxc7", "Kf7", 
                "cxd8=Q", "Bb4+", "Qxb4", "a5", "Qbxb6", "e5", "Qxc8", "a4", 
                "Qbb7", "h4", "Qxa8", "d6", "Qaxb8", "g6", "Qxg8+", "Ke7", 
                "Qxh8", "a3", "Qh6", "e4", "Qb7+", "Ke8", "Qh8#"
            ];
            
            for (const m of fastMoves) {
                game.move(m);
                render();
                updateStatus();
                await new Promise(r => setTimeout(r, 400)); // سرعة النقلات
            }
        }

        function resetGame() { game.reset(); lastMove = {from:null, to:null}; render(); updateStatus(); }
        function undoMove() { game.undo(); render(); }
        
        render();
    </script>
</body>
</html>
