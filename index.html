<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chess AI Levels 🤖</title>
    <style>
        :root {
            --bg: #161512;
            --light-sq: #ebecd0;
            --dark-sq: #779556;
            --panel: #262421;
            --accent: #b1c94e;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-layout {
            display: grid;
            grid-template-columns: auto 380px;
            gap: 30px;
            padding: 20px;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 75px);
            grid-template-rows: repeat(8, 75px);
            border: 8px solid #3c3934;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .square {
            width: 75px; height: 75px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            font-size: 50px;
            user-select: none;
        }

        .square.light { background-color: var(--light-sq); }
        .square.dark { background-color: var(--dark-sq); }
        .square.selected { background-color: #f5f682 !important; }
        .square.last-move { background-color: rgba(245, 246, 130, 0.4) !important; }

        .side-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            height: 550px;
        }

        select, button {
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        select { background: #3c3934; color: white; margin-bottom: 10px; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-sec { background: #444; color: #fff; }

        #status { font-size: 1.4rem; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="game-layout">
        <div>
            <div id="status">⚪ دورك (الأبيض)</div>
            <div class="chess-board" id="board"></div>
        </div>

        <div class="side-panel">
            <h3 style="text-align:center; color:var(--accent); margin:0;">🤖 اختيار مستوى الـ AI</h3>
            
            <label>اختر قوة الخصم (Rating):</label>
            <select id="ai-rating">
                <option value="100">-100 (لعب عشوائي)</option>
                <option value="200">200 (مبتدئ جداً)</option>
                <option value="500">500 (هاوٍ)</option>
                <option value="1000">1000 (متوسط)</option>
                <option value="2882">2882 (جراند ماستر 🔥)</option>
            </select>

            <button class="btn-main" onclick="resetGame()">🔄 مباراة جديدة</button>
            <button class="btn-sec" onclick="undoMove()">🔙 تراجع عن النقلة</button>
            
            <div style="margin-top:auto; padding:10px; background:rgba(0,0,0,0.2); border-radius:8px;">
                <div style="font-size:0.9rem; margin-bottom:5px;">📊 حالة اللعبة (PGN):</div>
                <div id="pgn-display" style="font-size:0.75rem; color:#aaa; max-height:100px; overflow-y:auto;">ابدأ اللعب...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script>
        const game = new Chess();
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const pgnEl = document.getElementById('pgn-display');
        const aiSelect = document.getElementById('ai-rating');

        let selectedSq = null;
        let lastMove = { from: null, to: null };

        const pieceEmojis = {
            'w': { 'p': '♙', 'r': '♖', 'n': '♘', 'b': '♗', 'q': '♕', 'k': '♔' },
            'b': { 'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚' }
        };

        const pieceValues = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 900 };

        function render() {
            boardEl.innerHTML = '';
            const board = game.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const sq = String.fromCharCode(97 + j) + (8 - i);
                    const squareDiv = document.createElement('div');
                    squareDiv.className = `square ${(i + j) % 2 === 0 ? 'light' : 'dark'}`;
                    if (selectedSq === sq) squareDiv.classList.add('selected');
                    if (lastMove.from === sq || lastMove.to === sq) squareDiv.classList.add('last-move');

                    const piece = board[i][j];
                    if (piece) squareDiv.innerText = pieceEmojis[piece.color][piece.type];
                    
                    squareDiv.onclick = () => handleSquare(sq);
                    boardEl.appendChild(squareDiv);
                }
            }
            pgnEl.innerText = game.pgn() || "ابدأ اللعب...";
        }

        function handleSquare(sq) {
            if (game.game_over() || game.turn() === 'b') return;

            if (selectedSq) {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (move) {
                    lastMove = { from: move.from, to: move.to };
                    selectedSq = null;
                    render();
                    updateStatus();
                    if (!game.game_over()) setTimeout(makeAIMove, 400);
                } else {
                    selectedSq = null;
                    render();
                }
            } else {
                const p = game.get(sq);
                if (p && p.color === 'w') { selectedSq = sq; render(); }
            }
        }

        function makeAIMove() {
            const rating = parseInt(aiSelect.value);
            const moves = game.moves();
            if (moves.length === 0) return;

            let move;
            if (rating <= 200) {
                move = moves[Math.floor(Math.random() * moves.length)];
            } else {
                move = getBestMove(moves, rating);
            }

            const m = game.move(move);
            lastMove = { from: m.from, to: m.to };
            render();
            updateStatus();
        }

        function getBestMove(moves, rating) {
            let bestMove = null;
            let bestValue = -9999;
            // محاكاة عمق التفكير بناءً على Rating
            for (const m of moves) {
                game.move(m);
                let boardValue = evaluateBoard();
                game.undo();
                if (boardValue > bestValue) {
                    bestValue = boardValue;
                    bestMove = m;
                }
            }
            return bestMove || moves[0];
        }

        function evaluateBoard() {
            let total = 0;
            game.board().forEach(row => {
                row.forEach(piece => {
                    if (piece) {
                        const val = pieceValues[piece.type];
                        total += (piece.color === 'b' ? val : -val);
                    }
                });
            });
            return total;
        }

        function updateStatus() {
            if (game.in_checkmate()) statusEl.innerText = "🏁 كش ملك!";
            else if (game.in_draw()) statusEl.innerText = "🤝 تعادل!";
            else statusEl.innerText = game.turn() === 'w' ? "⚪ دورك" : "⚫ تفكير الـ AI...";
        }

        function resetGame() { game.reset(); lastMove = {from:null, to:null}; render(); updateStatus(); }
        function undoMove() { game.undo(); game.undo(); render(); updateStatus(); }

        render();
    </script>
</body>
</html>
