<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج السلاسة - 210Hz</title>
    <!-- استدعاء المكتبات من روابط خارجية لضمان ظهور الرقعة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { 
            background: #161512; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white; 
            font-family: sans-serif; 
        }
        #myBoard { 
            width: 85vw; 
            max-width: 500px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
        }
        .status-panel { 
            margin-bottom: 20px; 
            background: #262421; 
            padding: 10px 25px; 
            border-radius: 30px; 
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="status-panel" id="status">الموقع جاهز.. العب حركتك بالأبيض</div>
    <div id="myBoard"></div>

    <!-- روابط السكريبتات الأساسية -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var statusEl = $('#status');

        // الموقع بيلعب ضدك باستخدام محرك داخلي سريع
        var engine = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function makeComputerMove() {
            statusEl.html('الموقع يفكر في نقلة...');
            engine.postMessage('uci');
            engine.postMessage('position fen ' + game.fen());
            engine.postMessage('go depth 13'); 

            engine.onmessage = function(e) {
                if (e.data.includes('bestmove')) {
                    var move = e.data.split('bestmove ')[1].split(' ')[0];
                    game.move(move, { sloppy: true });
                    board.position(game.fen());
                    statusEl.html('دورك الآن..');
                }
            };
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            // الموقع بيلعب رده فوراً بعد نقلتك
            window.setTimeout(makeComputerMove, 300);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            // رابط القطع الرسمي عشان تظهر وما تطلع شاشة بيضاء
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = ChessBoard('myBoard', config);
        $(window).resize(board.resize);
    </script>
</body>
</html>
