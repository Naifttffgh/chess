<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شطرنج السلاسة القصوى</title>
    <!-- مكتبة شكل الرقعة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #161512; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        #myBoard { width: 90vw; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .info { margin-bottom: 15px; color: #779556; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="info" id="status">جاهز للعب.. حرك قطعة!</div>
    <div id="myBoard"></div>

    <!-- المكتبات الأساسية -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var statusEl = $('#status');

        // سحب المحرك من رابط خارجي مباشرة عشان يشتغل الحين
        var engine = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function makeEngineMove() {
            statusEl.html('المحرك يحلل الآن...');
            engine.postMessage('uci');
            engine.postMessage('position fen ' + game.fen());
            engine.postMessage('go depth 12'); // عمق مناسب لسرعة شاشتك

            engine.onmessage = function(e) {
                if (e.data.includes('bestmove')) {
                    var move = e.data.split('bestmove ')[1].split(' ')[0];
                    game.move(move, { sloppy: true });
                    board.position(game.fen());
                    statusEl.html('دورك الآن (الأبيض)');
                }
            };
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            window.setTimeout(makeEngineMove, 250);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = ChessBoard('myBoard', config);
    </script>
</body>
</html>
