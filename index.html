<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج برو - 210Hz</title>
    
    <!-- مكتبة التنسيق - رابط مباشر فائق السرعة -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            background-color: #161512; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #myBoard { 
            width: 85vw; 
            max-width: 500px; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            border: 4px solid #3c3934;
            border-radius: 4px;
        }
        .status-box {
            margin-bottom: 20px;
            padding: 12px 25px;
            background: #262421;
            border-radius: 50px;
            font-weight: bold;
            color: #779556;
            border: 1px solid #403d39;
        }
    </style>
</head>
<body>

    <div class="status-box" id="status">جاهز للعب.. حرك قطعة بالأبيض</div>
    <div id="myBoard"></div>

    <!-- تحميل المكتبات بترتيب صحيح جداً لضمان عمل الرقعة -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        // إعدادات اللعبة
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        // الموقع هو الخصم (تحميل المحرك)
        var engine = new Worker('https://cdn.jsdelivr.net/npm/stockfish@10.0.2/src/stockfish.js');

        function makeComputerMove() {
            $status.html('الموقع يفكر في رد قوي...');
            
            engine.postMessage('uci');
            engine.postMessage('position fen ' + game.fen());
            engine.postMessage('go depth 13'); 

            engine.onmessage = function(e) {
                if (e.data.includes('bestmove')) {
                    var moveStr = e.data.split('bestmove ')[1].split(' ')[0];
                    game.move(moveStr, { sloppy: true });
                    board.position(game.fen());
                    $status.html('دورك الآن..');
                }
            };
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            $status.html('انتظر رد الموقع..');
            window.setTimeout(makeComputerMove, 250);
        }

        function onDragStart (source, piece) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        // تشغيل الرقعة مع الصور الرسمية
        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = ChessBoard('myBoard', config);

        // لضمان السلاسة عند تغيير حجم المتصفح
        $(window).resize(board.resize);
    </script>
</body>
</html>
