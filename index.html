<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج - المحرك المحلي</title>
    
    <!-- مكتبة التنسيق للرقعة من مصدر خارجي موثوق -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            background-color: #161512; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white;
            font-family: sans-serif;
        }
        #myBoard { 
            width: 85vw; 
            max-width: 550px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .status { margin-bottom: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="status" id="gameStatus">دورك (الأبيض)</div>
    <div id="myBoard"></div>

    <!-- استدعاء المكتبات الضرورية (JQuery + Chess.js + Chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var statusEl = $('#gameStatus');

        // استدعاء المحرك من المسار الذي حددته في مجلد public
        // تأكد أن المجلدات بنفس الاسم: logic/engine/
        var engine = new Worker('/logic/engine/stockfish.worker.js');

        function onDragStart (source, piece, position, orientation) {
            // منع تحريك القطع إذا انتهت اللعبة أو كان دور الأسود (البوت)
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        function makeEngineMove() {
            statusEl.html('المحرك يفكر...');
            
            engine.postMessage('position fen ' + game.fen());
            engine.postMessage('go depth 15');
            
            engine.onmessage = function(e) {
                if (e.data.includes('bestmove')) {
                    var moveStr = e.data.split('bestmove ')[1].split(' ')[0];
                    game.move(moveStr, { sloppy: true });
                    board.position(game.fen());
                    statusEl.html('دورك الآن');
                    checkGameOver();
                }
            };
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            window.setTimeout(makeEngineMove, 250);
        }

        function checkGameOver() {
            if (game.in_checkmate()) statusEl.html('كش ملك! انتهت اللعبة.');
            else if (game.in_draw()) statusEl.html('تعادل!');
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            // استخدام صور القطع من سيرفر خارجي لضمان عدم ظهور شاشة بيضاء إذا فقدت ملفات الصور المحلية
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = ChessBoard('myBoard', config);
    </script>
</body>
</html>
