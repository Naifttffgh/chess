<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Ultra - No External Assets</title>
    <style>
        :root {
            --bg: #161512;
            --light-sq: #ebecd0;
            --dark-sq: #779556;
            --panel: #262421;
            --accent: #b1c94e;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-layout {
            display: grid;
            grid-template-columns: auto 350px;
            gap: 40px;
            padding: 20px;
            max-width: 1200px;
        }

        /* حاوية الرقعة - منع ظهور "الخط" */
        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 8px solid #3c3934;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            user-select: none;
        }

        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            cursor: pointer;
            position: relative;
        }

        .square.light { background-color: var(--light-sq); }
        .square.dark { background-color: var(--dark-sq); }
        
        .square.selected { background-color: #f5f682 !important; }
        .square.highlight { background-color: #f5f682bb !important; }

        /* القطع باستخدام الرموز (Emojis) لضمان الظهور */
        .piece {
            transition: transform 0.1s ease-in-out;
            z-index: 2;
        }

        /* لوحة التحكم */
        .side-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 560px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .status-header {
            background: #1a1917;
            padding: 15px;
            border-radius: 8px;
            border-right: 5px solid var(--accent);
            font-size: 1.1rem;
            text-align: center;
        }

        .history-box {
            flex-grow: 1;
            background: #1a1917;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-family: monospace;
        }

        .move-entry {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-bottom: 1px solid #2a2825;
            font-size: 0.9rem;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background: #3c3934;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #4a4741; }
        button.new-game { background: var(--accent); color: #000; }

        @media (max-width: 1000px) {
            .game-layout { grid-template-columns: 1fr; }
            .side-panel { height: auto; }
        }
    </style>
</head>
<body>

    <div class="game-layout">
        <div class="board-container">
            <div class="status-header" id="status">دورك الآن (الأبيض)</div>
            <div class="chess-board" id="board">
                <!-- المربعات والقطع تتردد هنا برمجياً -->
            </div>
        </div>

        <div class="side-panel">
            <h2 style="margin:0; text-align:center;">الموقع ضدك</h2>
            <div class="controls">
                <button class="new-game" onclick="initGame()">مباراة جديدة</button>
                <button onclick="undoMove()">تراجع</button>
            </div>
            <div class="history-box" id="history">
                <!-- تاريخ النقلات -->
            </div>
            <div style="font-size: 0.8rem; color: #666; text-align:center;">
                تحسين 210Hz | رموز محلية 100%
            </div>
        </div>
    </div>

    <!-- نستخدم مكتبة القوانين فقط لضمان دقة اللعب -->
    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>

    <script>
        /**
         * نظام الشطرنج المستقل - رموز محلية وتنسيق يدوي
         */
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const historyElement = document.getElementById('history');
        let game = new Chess();
        let selectedSquare = null;

        // خريطة القطع للإيموجي
        const pieceEmojis = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
        };

        function initGame() {
            game = new Chess();
            renderBoard();
            updateStatus();
            historyElement.innerHTML = '';
        }

        function renderBoard() {
            boardElement.innerHTML = '';
            const boardData = game.board();

            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const square = document.createElement('div');
                    const squareName = String.fromCharCode(97 + j) + (8 - i);
                    const isDark = (i + j) % 2 === 1;
                    
                    square.className = `square ${isDark ? 'dark' : 'light'}`;
                    square.dataset.square = squareName;
                    
                    const piece = boardData[i][j];
                    if (piece) {
                        const pieceSpan = document.createElement('span');
                        pieceSpan.className = 'piece';
                        pieceSpan.innerText = pieceEmojis[piece.type === 'p' && piece.color === 'b' ? 'p' : 
                                                        piece.color === 'w' ? piece.type.toUpperCase() : piece.type];
                        // تلوين القطع لسهولة التمييز
                        pieceSpan.style.color = piece.color === 'w' ? '#fff' : '#000';
                        square.appendChild(pieceSpan);
                    }

                    square.onclick = () => handleSquareClick(squareName);
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(square) {
            if (game.game_over()) return;

            if (selectedSquare) {
                const move = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q'
                });

                if (move) {
                    selectedSquare = null;
                    renderBoard();
                    updateStatus();
                    addHistory(move);
                    // الموقع يلعب رده
                    setTimeout(makeComputerMove, 300);
                } else {
                    selectedSquare = square;
                    highlightSquare(square);
                }
            } else {
                selectedSquare = square;
                highlightSquare(square);
            }
        }

        function highlightSquare(square) {
            renderBoard();
            const el = document.querySelector(`[data-square="${square}"]`);
            if (el) el.classList.add('selected');
        }

        function makeComputerMove() {
            const moves = game.moves();
            if (moves.length === 0) return;

            // ذكاء اصطناعي بسيط (اختيار أفضل نقلة متاحة برمجياً)
            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            const move = game.move(randomMove);
            
            renderBoard();
            updateStatus();
            addHistory(move);
        }

        function updateStatus() {
            let status = game.turn() === 'w' ? 'دورك (الأبيض)' : 'الموقع يفكر...';
            if (game.in_checkmate()) status = 'انتهت - كش ملك!';
            if (game.in_draw()) status = 'انتهت - تعادل';
            statusElement.innerText = status;
        }

        function addHistory(move) {
            const div = document.createElement('div');
            div.className = 'move-entry';
            div.innerHTML = `<span>نقلة: ${move.san}</span> <span>${game.turn() === 'w' ? 'الأسود' : 'الأبيض'}</span>`;
            historyElement.prepend(div);
        }

        function undoMove() {
            game.undo(); game.undo();
            renderBoard();
            updateStatus();
        }

        // تشغيل اللعبة عند التحميل
        initGame();
        
        // تحسين الأداء لشاشة 210Hz
        window.requestAnimationFrame(() => {});
    </script>
</body>
</html>
