<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chess Emoji Edition 🏆</title>
    <style>
        :root {
            --bg: #161512;
            --light-sq: #ebecd0;
            --dark-sq: #779556;
            --panel: #262421;
            --accent: #b1c94e;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-layout {
            display: grid;
            grid-template-columns: auto 380px;
            gap: 30px;
            padding: 20px;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 75px);
            grid-template-rows: repeat(8, 75px);
            border: 8px solid #3c3934;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            user-select: none;
        }

        .square {
            width: 75px; height: 75px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            font-size: 50px; /* حجم الإيموجي */
        }

        .square.light { background-color: var(--light-sq); }
        .square.dark { background-color: var(--dark-sq); }
        .square.selected { background-color: #f5f682 !important; }
        .square.last-move { background-color: rgba(245, 246, 130, 0.4) !important; }

        .side-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 600px;
        }

        .pgn-container {
            flex-grow: 1;
            background: #1a1917;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            overflow-y: auto;
            color: #ccc;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-sec { background: #3c3934; color: #fff; }
    </style>
</head>
<body>

    <div class="game-layout">
        <div style="text-align:center;">
            <div id="status" style="margin-bottom:15px; font-size:1.5rem;">⚪ دور الأبيض</div>
            <div class="chess-board" id="board"></div>
        </div>

        <div class="side-panel">
            <h3 style="text-align:center; color:var(--accent);">⚙️ لوحة التحكم</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-main" onclick="resetGame()">🔄 مباراة جديدة</button>
                <button class="btn-sec" onclick="undoMove()">🔙 تراجع</button>
            </div>
            
            <div style="font-size:0.9rem;">📝 سجل النقلات:</div>
            <div class="pgn-container" id="pgn-display"></div>
            
            <button class="btn-sec" style="background:#4a90e2" onclick="copyPGN()">📋 نسخ الـ PGN</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script>
        const game = new Chess();
        const boardEl = document.getElementById('board');
        const pgnEl = document.getElementById('pgn-display');
        const statusEl = document.getElementById('status');

        let selectedSq = null;
        let lastMove = { from: null, to: null };

        // خريطة الإيموجي للقطع
        const pieceEmojis = {
            'w': { 'p': '♙', 'r': '♖', 'n': '♘', 'b': '♗', 'q': '♕', 'k': '♔' },
            'b': { 'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚' }
        };

        function render() {
            boardEl.innerHTML = '';
            const board = game.board();

            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const sq = String.fromCharCode(97 + j) + (8 - i);
                    const squareDiv = document.createElement('div');
                    squareDiv.className = `square ${(i + j) % 2 === 0 ? 'light' : 'dark'}`;
                    
                    if (selectedSq === sq) squareDiv.classList.add('selected');
                    if (lastMove.from === sq || lastMove.to === sq) squareDiv.classList.add('last-move');

                    const piece = board[i][j];
                    if (piece) {
                        // استخدام الإيموجي بدلاً من الصورة
                        squareDiv.innerText = pieceEmojis[piece.color][piece.type];
                    }

                    squareDiv.onclick = () => handleSquare(sq);
                    boardEl.appendChild(squareDiv);
                }
            }
            pgnEl.innerText = game.pgn() || "ابدأ اللعب... 🚀";
        }

        function handleSquare(sq) {
            if (game.game_over()) return;

            if (selectedSq) {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (move) {
                    lastMove = { from: move.from, to: move.to };
                    selectedSq = null;
                    render();
                    updateStatus();
                    setTimeout(cpuMove, 400);
                } else {
                    selectedSq = null;
                    render();
                }
            } else {
                const p = game.get(sq);
                if (p && p.color === game.turn()) {
                    selectedSq = sq;
                    render();
                }
            }
        }

        function cpuMove() {
            const moves = game.moves();
            if (moves.length === 0) return;
            const move = game.move(moves[Math.floor(Math.random() * moves.length)]);
            lastMove = { from: move.from, to: move.to };
            render();
            updateStatus();
        }

        function updateStatus() {
            let s = game.turn() === 'w' ? "⚪ دور الأبيض" : "⚫ دور الأسود (يفكر...)";
            if (game.in_checkmate()) s = "🏁 كش ملك! انتهت اللعبة";
            if (game.in_draw()) s = "🤝 تعادل!";
            statusEl.innerText = s;
        }

        function resetGame() {
            game.reset();
            lastMove = { from: null, to: null };
            render();
            updateStatus();
        }

        function undoMove() {
            game.undo(); game.undo();
            render();
        }

        function copyPGN() {
            navigator.clipboard.writeText(game.pgn());
            alert("✅ تم النسخ!");
        }

        render();
    </script>
</body>
</html>
