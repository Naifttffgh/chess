<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Master - Local Assets & PGN</title>
    <style>
        :root {
            --bg: #161512;
            --light-sq: #ebecd0;
            --dark-sq: #779556;
            --panel: #262421;
            --accent: #b1c94e;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-layout {
            display: grid;
            grid-template-columns: auto 380px;
            gap: 30px;
            padding: 20px;
        }

        /* الرقعة لمنع ظهور الخط */
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 75px);
            grid-template-rows: repeat(8, 75px);
            border: 10px solid #3c3934;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .square {
            width: 75px;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .square.light { background-color: var(--light-sq); }
        .square.dark { background-color: var(--dark-sq); }
        .square.selected { background-color: #f5f682 !important; }

        /* تنسيق القطع (الصور المحلية) */
        .piece-img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            pointer-events: none;
            z-index: 2;
        }

        /* لوحة التحكم الجانبية */
        .side-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 620px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .history-box {
            flex-grow: 1;
            background: #1a1917;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
        }

        .pgn-display {
            background: #111;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            color: #888;
            word-break: break-all;
            max-height: 60px;
            overflow-y: auto;
            border: 1px dashed #444;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-sec { background: #3c3934; color: #fff; }
        .btn-pgn { background: #4a90e2; color: #fff; grid-column: span 2; }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* نافذة التوزير */
        #promo-modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 15px;
            border-radius: 10px;
            z-index: 1000;
            border: 2px solid var(--accent);
        }
    </style>
</head>
<body>

    <div class="game-layout">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div id="status" style="margin-bottom:10px; font-size:1.2rem;">استعد للعب..</div>
            <div class="chess-board" id="board"></div>
            
            <div id="promo-modal">
                <div style="margin-bottom:10px; text-align:center;">اختر قطعة الترقية:</div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-sec" onclick="selectPromo('q')">وزير</button>
                    <button class="btn-sec" onclick="selectPromo('r')">قلعة</button>
                    <button class="btn-sec" onclick="selectPromo('b')">فيل</button>
                    <button class="btn-sec" onclick="selectPromo('n')">حصان</button>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <h3 style="margin:0; color:var(--accent); text-align:center;">لوحة التحكم</h3>
            
            <div class="btn-group">
                <button class="btn-main" onclick="resetGame()">مباراة جديدة</button>
                <button class="btn-sec" onclick="undoMove()">تراجع</button>
                <button class="btn-pgn" onclick="exportPGN()">تصدير ملف PGN (نسخ)</button>
            </div>

            <div style="font-size:0.8rem; color:#aaa;">سجل النقلات المباشر:</div>
            <div class="history-box" id="history"></div>

            <div style="font-size:0.8rem; color:#aaa;">كود PGN الحالي:</div>
            <div class="pgn-display" id="pgn-text"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>

    <script>
        const boardEl = document.getElementById('board');
        const pgnEl = document.getElementById('pgn-text');
        const historyEl = document.getElementById('history');
        const statusEl = document.getElementById('status');
        
        let game = new Chess();
        let selectedSquare = null;
        let pendingMove = null;

        // دالة لجلب مسار الصورة من المجلد المحلي
        // التسمية المتوقعة: wP (عسكري أبيض)، bK (ملك أسود)
        function getPieceImg(piece) {
            const color = piece.color; // 'w' or 'b'
            const type = piece.type.toUpperCase(); // P, R, N, B, Q, K
            return `pieces/${color}${type}.png`; 
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            const boardData = game.board();

            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const square = document.createElement('div');
                    const squareName = String.fromCharCode(97 + j) + (8 - i);
                    
                    square.className = `square ${(i+j)%2 === 1 ? 'dark' : 'light'}`;
                    square.dataset.square = squareName;
                    if (selectedSquare === squareName) square.classList.add('selected');

                    const piece = boardData[i][j];
                    if (piece) {
                        const img = document.createElement('img');
                        img.src = getPieceImg(piece);
                        img.className = 'piece-img';
                        // في حال لم تجد الصورة، استخدم النص كاحتياط
                        img.onerror = () => { img.style.display='none'; square.innerText = piece.type; };
                        square.appendChild(img);
                    }

                    square.onclick = () => onSquareClick(squareName);
                    boardEl.appendChild(square);
                }
            }
            pgnEl.innerText = game.pgn();
        }

        function onSquareClick(sq) {
            if (game.game_over() || pendingMove) return;

            if (selectedSquare) {
                const moveData = { from: selectedSquare, to: sq };
                const piece = game.get(selectedSquare);
                
                // فحص الترقية (التوزير)
                if (piece && piece.type === 'p' && (sq[1] === '8' || sq[1] === '1')) {
                    pendingMove = moveData;
                    document.getElementById('promo-modal').style.display = 'block';
                    return;
                }

                executeMove(moveData);
            } else {
                const p = game.get(sq);
                if (p && p.color === 'w') {
                    selectedSquare = sq;
                    renderBoard();
                }
            }
        }

        function selectPromo(type) {
            if (pendingMove) {
                pendingMove.promotion = type;
                executeMove(pendingMove);
                pendingMove = null;
                document.getElementById('promo-modal').style.display = 'none';
            }
        }

        function executeMove(m) {
            const move = game.move(m);
            if (move) {
                selectedSquare = null;
                renderBoard();
                updateHistory(move);
                setTimeout(makeCPUMove, 300);
            } else {
                selectedSquare = null;
                renderBoard();
            }
        }

        function makeCPUMove() {
            const moves = game.moves();
            if (moves.length === 0) return;
            const move = game.move(moves[Math.floor(Math.random() * moves.length)]);
            renderBoard();
            updateHistory(move);
        }

        function updateHistory(move) {
            const entry = document.createElement('div');
            entry.style.borderBottom = '1px solid #333';
            entry.style.padding = '3px';
            entry.innerText = `${game.turn() === 'w' ? 'الأسود' : 'الأبيض'}: ${move.san}`;
            historyEl.prepend(entry);
            
            let s = "دورك الآن";
            if (game.in_checkmate()) s = "كش ملك! انتهت اللعبة.";
            statusEl.innerText = s;
        }

        function exportPGN() {
            const pgn = game.pgn();
            navigator.clipboard.writeText(pgn);
            alert("تم نسخ كود PGN للحافظة:\n\n" + pgn);
        }

        function undoMove() {
            game.undo(); game.undo();
            renderBoard();
            historyEl.innerHTML = '';
        }

        function resetGame() {
            game.reset();
            historyEl.innerHTML = '';
            renderBoard();
        }

        renderBoard();
    </script>
</body>
</html>
