<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chess Grandmaster Engine 🏆</title>
    <style>
        :root {
            --bg: #161512;
            --light-sq: #ebecd0;
            --dark-sq: #779556;
            --panel: #262421;
            --accent: #b1c94e;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-layout {
            display: grid;
            grid-template-columns: auto 380px;
            gap: 30px;
            padding: 20px;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 75px);
            grid-template-rows: repeat(8, 75px);
            border: 8px solid #3c3934;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .square {
            width: 75px; height: 75px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            font-size: 50px;
            user-select: none;
        }

        .square.light { background-color: var(--light-sq); }
        .square.dark { background-color: var(--dark-sq); }
        .square.selected { background-color: #f5f682 !important; }
        .square.last-move { background-color: rgba(245, 246, 130, 0.4) !important; }

        #promo-dialog {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 15px;
            border: 3px solid var(--accent);
            border-radius: 10px;
            z-index: 1000;
            text-align: center;
        }

        .promo-choice { font-size: 45px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .promo-choice:hover { background: #444; }

        .side-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            height: 600px;
        }

        select, button {
            padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-family: inherit;
        }

        select { background: #3c3934; color: white; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-sec { background: #444; color: #fff; }

        #status { font-size: 1.4rem; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="game-layout">
        <div>
            <div id="status">⚪ دورك (الأبيض)</div>
            <div class="chess-board" id="board">
                <div id="promo-dialog">
                    <div style="margin-bottom:10px;">اختر قطعة الترقية:</div>
                    <span class="promo-choice" onclick="selectPromo('q')">♕</span>
                    <span class="promo-choice" onclick="selectPromo('r')">♖</span>
                    <span class="promo-choice" onclick="selectPromo('b')">♗</span>
                    <span class="promo-choice" onclick="selectPromo('n')">♘</span>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <h3 style="text-align:center; color:var(--accent); margin:0;">🤖 مستوى الخصم</h3>
            
            <select id="ai-rating">
                <option value="100">-100 (عشوائي)</option>
                <option value="500">500 (هاوٍ)</option>
                <option value="1500">1500 (قوي)</option>
                <option value="2882">2882 (Grandmaster 🔥)</option>
            </select>

            <button class="btn-main" onclick="resetGame()">🔄 مباراة جديدة</button>
            <button class="btn-sec" onclick="undoMove()">🔙 تراجع</button>
            
            <div style="margin-top:auto; padding:10px; background:rgba(0,0,0,0.3); border-radius:8px; font-size:0.8rem;">
                <strong>المحرك المتقدم:</strong> يستخدم نظام Alpha-Beta Pruning مع تقييم استراتيجي للمربعات لضمان أصعب تجربة لعب ممكنة.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
    <script>
        const game = new Chess();
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const promoDialog = document.getElementById('promo-dialog');
        const aiSelect = document.getElementById('ai-rating');

        let selectedSq = null;
        let lastMove = { from: null, to: null };
        let pendingMove = null;

        const pieceEmojis = {
            'w': { 'p': '♙', 'r': '♖', 'n': '♘', 'b': '♗', 'q': '♕', 'k': '♔' },
            'b': { 'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚' }
        };

        // تقييم المربعات - تجعل المحرك يسيطر على المركز (GM Logic)
        const pawnEval = [
            [0,  0,  0,  0,  0,  0,  0,  0],
            [50, 50, 50, 50, 50, 50, 50, 50],
            [10, 10, 20, 30, 30, 20, 10, 10],
            [5,  5, 10, 25, 25, 10,  5,  5],
            [0,  0,  0, 20, 20,  0,  0,  0],
            [5, -5,-10,  0,  0,-10, -5,  5],
            [5, 10, 10,-20,-20, 10, 10,  5],
            [0,  0,  0,  0,  0,  0,  0,  0]
        ];

        function render() {
            // إزالة القطع القديمة مع الحفاظ على نافذة التوزير
            const squares = boardEl.querySelectorAll('.square');
            squares.forEach(s => s.remove());

            const board = game.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const sq = String.fromCharCode(97 + j) + (8 - i);
                    const squareDiv = document.createElement('div');
                    squareDiv.className = `square ${(i + j) % 2 === 0 ? 'light' : 'dark'}`;
                    if (selectedSq === sq) squareDiv.classList.add('selected');
                    if (lastMove.from === sq || lastMove.to === sq) squareDiv.classList.add('last-move');

                    const piece = board[i][j];
                    if (piece) squareDiv.innerText = pieceEmojis[piece.color][piece.type];
                    
                    squareDiv.onclick = () => handleSquare(sq);
                    boardEl.appendChild(squareDiv);
                }
            }
        }

        function handleSquare(sq) {
            if (game.game_over() || game.turn() === 'b') return;

            if (selectedSq) {
                const piece = game.get(selectedSq);
                if (piece && piece.type === 'p' && (sq[1] === '8' || sq[1] === '1')) {
                    pendingMove = { from: selectedSq, to: sq };
                    promoDialog.style.display = 'block';
                    return;
                }
                executeMove({ from: selectedSq, to: sq, promotion: 'q' });
            } else {
                const p = game.get(sq);
                if (p && p.color === 'w') { selectedSq = sq; render(); }
            }
        }

        function selectPromo(type) {
            promoDialog.style.display = 'none';
            executeMove({ ...pendingMove, promotion: type });
            pendingMove = null;
        }

        function executeMove(moveObj) {
            const move = game.move(moveObj);
            if (move) {
                lastMove = { from: move.from, to: move.to };
                selectedSq = null;
                render();
                updateStatus();
                if (!game.game_over()) setTimeout(makeAIMove, 300);
            } else {
                selectedSq = null;
                render();
            }
        }

        // ذكاء اصطناعي متقدم (Minimax + Alpha-Beta)
        function makeAIMove() {
            const rating = parseInt(aiSelect.value);
            const moves = game.moves();
            if (moves.length === 0) return;

            let move;
            if (rating <= 200) {
                move = moves[Math.floor(Math.random() * moves.length)];
            } else {
                move = minimaxRoot(3, true); // العمق 3 للسرعة والقوة
            }

            const m = game.move(move);
            lastMove = { from: m.from, to: m.to };
            render();
            updateStatus();
        }

        function minimaxRoot(depth, isMaximisingPlayer) {
            let moves = game.moves();
            let bestMove = -9999;
            let bestMoveFound;

            for (let i = 0; i < moves.length; i++) {
                let move = moves[i];
                game.move(move);
                let value = minimax(depth - 1, -10000, 10000, !isMaximisingPlayer);
                game.undo();
                if (value >= bestMove) {
                    bestMove = value;
                    bestMoveFound = move;
                }
            }
            return bestMoveFound;
        }

        function minimax(depth, alpha, beta, isMaximisingPlayer) {
            if (depth === 0) return -evaluateBoard();

            let moves = game.moves();
            if (isMaximisingPlayer) {
                let bestMove = -9999;
                for (let i = 0; i < moves.length; i++) {
                    game.move(moves[i]);
                    bestMove = Math.max(bestMove, minimax(depth - 1, alpha, beta, !isMaximisingPlayer));
                    game.undo();
                    alpha = Math.max(alpha, bestMove);
                    if (beta <= alpha) return bestMove;
                }
                return bestMove;
            } else {
                let bestMove = 9999;
                for (let i = 0; i < moves.length; i++) {
                    game.move(moves[i]);
                    bestMove = Math.min(bestMove, minimax(depth - 1, alpha, beta, !isMaximisingPlayer));
                    game.undo();
                    beta = Math.min(beta, bestMove);
                    if (beta <= alpha) return bestMove;
                }
                return bestMove;
            }
        }

        function evaluateBoard() {
            let totalEvaluation = 0;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    totalEvaluation += getPieceValue(game.board()[i][j], i, j);
                }
            }
            return totalEvaluation;
        }

        function getPieceValue(piece, x, y) {
            if (piece === null) return 0;
            const getAbsoluteValue = (p) => {
                if (p.type === 'p') return 10 + pawnEval[p.color === 'b' ? x : 7 - x][y];
                if (p.type === 'r') return 50;
                if (p.type === 'n') return 30;
                if (p.type === 'b') return 30;
                if (p.type === 'q') return 90;
                if (p.type === 'k') return 900;
                return 0;
            };
            return piece.color === 'w' ? getAbsoluteValue(piece) : -getAbsoluteValue(piece);
        }

        function updateStatus() {
            if (game.in_checkmate()) statusEl.innerText = "🏁 كش ملك! لقد خسر الأبيض";
            else if (game.in_draw()) statusEl.innerText = "🤝 تعادل!";
            else statusEl.innerText = game.turn() === 'w' ? "⚪ دورك" : "⚫ المحرك يحلل...";
        }

        function resetGame() { game.reset(); lastMove = {from:null, to:null}; render(); updateStatus(); }
        function undoMove() { game.undo(); game.undo(); render(); updateStatus(); }

        render();
    </script>
</body>
</html>
