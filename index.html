<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج السلاسة القصوى</title>
    
    <!-- مكتبة التنسيق للرقعة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            background-color: #161512; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        #myBoard { 
            width: 90vw; 
            max-width: 500px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }
        .status-box {
            margin-bottom: 15px;
            padding: 10px 20px;
            background: #262421;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: #779556;
        }
    </style>
</head>
<body>

    <div class="status-box" id="status">الموقع جاهز.. العب حركتك بالأبيض</div>
    <div id="myBoard"></div>

    <!-- استدعاء المكتبات الضرورية من روابط مباشرة -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        // استدعاء محرك ستوك فيش من رابط مباشر (CDN) ليعمل الموقع كخصم لك
        var engine = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        function makeComputerMove() {
            $status.html('الموقع يفكر...');
            
            engine.postMessage('uci');
            engine.postMessage('position fen ' + game.fen());
            engine.postMessage('go depth 13'); // عمق مناسب لسرعة شاشتك الـ 210Hz

            engine.onmessage = function(e) {
                if (e.data.includes('bestmove')) {
                    var moveStr = e.data.split('bestmove ')[1].split(' ')[0];
                    game.move(moveStr, { sloppy: true });
                    board.position(game.fen());
                    $status.html('دورك الآن..');
                }
            };
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            // لا تسمح للمستخدم بتحريك قطع الأسود (الموقع)
            if (piece.search(/^b/) !== -1) return false;
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            // إذا كانت الحركة غير قانونية
            if (move === null) return 'snapback';

            $status.html('انتظر رد الموقع..');
            window.setTimeout(makeComputerMove, 250);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            // ثيم القطع لضمان ظهورها
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = ChessBoard('myBoard', config);

        // لجعل الرقعة متجاوبة مع حجم الشاشة
        $(window).resize(board.resize);
    </script>
</body>
</html>
